<html lang="zh-TW">

<title>特選之路｜高三生的選擇模擬</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #FAF7F2;
    --ink: #1C1C1E;
    --ink-soft: #4A4A52;
    --ink-muted: #8E8E96;
    --accent: #C06B3A;
    --accent-light: #F5E6DA;
    --green: #3A7D5A;
    --green-light: #E0F0E8;
    --red: #C03A3A;
    --red-light: #F5E0E0;
    --blue: #3A5AC0;
    --blue-light: #E0E6F5;
    --border: rgba(28,28,30,0.1);
    --radius: 16px;
    --radius-sm: 10px;
  }

  html, body {
    min-height: 100vh;
    background: var(--cream);
    font-family: 'Noto Sans TC', 'Hiragino Kaku Gothic ProN', sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
  }

  /* ── 頂部標題列 ── */
  .game-header {
    width: 100%;
    max-width: 560px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }
  .game-logo {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-muted);
    letter-spacing: 0.06em;
  }
  .progress-wrap {
    flex: 1;
    margin: 0 1rem;
    height: 3px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }
  .scene-counter {
    font-size: 12px;
    color: var(--ink-muted);
    font-weight: 500;
  }

  /* ── 主卡片 ── */
  .card {
    width: 100%;
    max-width: 560px;
    background: #fff;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    animation: fadeUp 0.4s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── 插圖區 ── */
  .illustration-wrap {
    width: 100%;
    background: var(--accent-light);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem 1.5rem;
    min-height: 200px;
    position: relative;
  }
  .illustration-wrap svg {
    width: 100%;
    max-width: 360px;
    height: auto;
  }

  /* ── 場景標籤 ── */
  .badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 3px 10px;
    border-radius: 99px;
    margin-bottom: 0.6rem;
  }
  .badge-month  { background: #EDE9FE; color: #5B21B6; }
  .badge-warn   { background: #FEF3C7; color: #92400E; }
  .badge-danger { background: #FEE2E2; color: #991B1B; }

  /* ── 文字區 ── */
  .card-body { padding: 1.5rem 1.5rem 0; }
  .scene-hook {
    font-size: 20px;
    font-weight: 700;
    line-height: 1.35;
    color: var(--ink);
    margin-bottom: 0.3rem;
  }
  .scene-sub {
    font-size: 13px;
    color: var(--ink-muted);
    font-style: italic;
    margin-bottom: 1rem;
    line-height: 1.5;
  }
  .divider {
    height: 1px;
    background: var(--border);
    margin-bottom: 1rem;
  }
  .scene-text {
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.85;
    margin-bottom: 1.5rem;
  }

  /* ── 選項 ── */
  .choices { padding: 0 1.5rem 1.5rem; display: flex; flex-direction: column; gap: 10px; }
  .choice-btn {
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    font-size: 13px;
    font-family: inherit;
    color: var(--ink);
    cursor: pointer;
    text-align: left;
    line-height: 1.6;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
  }
  .choice-btn:hover:not(:disabled) {
    background: #fff;
    border-color: var(--accent);
    transform: translateY(-1px);
  }
  .choice-btn:active:not(:disabled) { transform: scale(0.98); }
  .choice-btn.correct { border-color: var(--green); background: var(--green-light); color: #1A4731; }
  .choice-btn.wrong   { border-color: var(--red);   background: var(--red-light);   color: #6B1A1A; }
  .choice-btn.neutral { border-color: var(--blue);  background: var(--blue-light);  color: #1A2F6B; }
  .choice-btn:disabled { cursor: default; }

  /* ── 回饋 ── */
  .feedback-box {
    margin: 0 1.5rem 0;
    padding: 12px 14px;
    background: var(--cream);
    border-left: 3px solid var(--accent);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.7;
    animation: fadeUp 0.3s ease both;
  }
  .next-btn {
    display: block;
    width: calc(100% - 3rem);
    margin: 1rem 1.5rem 1.5rem;
    padding: 13px;
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: background 0.15s, transform 0.1s;
    animation: fadeUp 0.3s 0.1s ease both;
  }
  .next-btn:hover { background: #333; }
  .next-btn:active { transform: scale(0.98); }

  /* ── 結局 ── */
  .end-illustration {
    width: 100%;
    background: var(--accent-light);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
    min-height: 180px;
  }
  .end-body { padding: 1.5rem; }
  .end-hook { font-size: 22px; font-weight: 700; color: var(--ink); margin-bottom: 0.3rem; line-height: 1.3; }
  .end-sub  { font-size: 13px; color: var(--ink-muted); font-style: italic; margin-bottom: 1rem; }
  .end-desc {
    font-size: 13px; color: var(--ink-soft); line-height: 1.8;
    background: var(--cream); border-radius: var(--radius-sm);
    padding: 1rem 1.1rem; margin-bottom: 1.25rem;
  }
  .score-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.25rem; }
  .score-card { background: var(--cream); border-radius: var(--radius-sm); padding: 0.75rem 1rem; }
  .score-label { font-size: 11px; color: var(--ink-muted); margin-bottom: 3px; }
  .score-value { font-size: 22px; font-weight: 700; color: var(--ink); }
  .source-note { font-size: 11px; color: var(--ink-muted); line-height: 1.6; margin-bottom: 1.25rem; }
  .restart-btn {
    display: block; width: 100%; padding: 13px;
    background: var(--ink); color: #fff; border: none;
    border-radius: var(--radius-sm); font-size: 14px;
    font-family: inherit; font-weight: 500; cursor: pointer;
    transition: background 0.15s;
  }
  .restart-btn:hover { background: #333; }

  /* ── 開場畫面 ── */
  .intro-card {
    width: 100%;
    max-width: 560px;
    background: #fff;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    animation: fadeUp 0.5s ease both;
  }
  .intro-illus {
    width: 100%;
    background: var(--accent-light);
    display: flex; align-items: center; justify-content: center;
    padding: 2.5rem 2rem;
    min-height: 220px;
  }
  .intro-body { padding: 2rem; }
  .intro-tag { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; color: var(--accent); margin-bottom: 0.75rem; text-transform: uppercase; }
  .intro-title { font-size: 26px; font-weight: 700; line-height: 1.3; color: var(--ink); margin-bottom: 0.5rem; }
  .intro-desc { font-size: 13px; color: var(--ink-soft); line-height: 1.8; margin-bottom: 1.75rem; }
  .intro-meta { display: flex; gap: 1.5rem; margin-bottom: 1.75rem; }
  .intro-meta-item { font-size: 12px; color: var(--ink-muted); }
  .intro-meta-item strong { display: block; font-size: 14px; font-weight: 700; color: var(--ink); margin-bottom: 2px; }
  .start-btn {
    display: block; width: 100%; padding: 14px;
    background: var(--ink); color: #fff; border: none;
    border-radius: var(--radius-sm); font-size: 15px;
    font-family: inherit; font-weight: 700; cursor: pointer;
    letter-spacing: 0.05em; transition: background 0.15s;
  }
  .start-btn:hover { background: #333; }

  @media (max-width: 480px) {
    .scene-hook { font-size: 17px; }
    .intro-title { font-size: 22px; }
  }
</style>

    badge: { text: '大學一年級 · 新的考驗', type: 'badge-month' },
    hook: '進了大學，但比賽還沒結束',
    sub: '當旁邊的同學是學測強者，你的優勢在哪裡？',
    text: '你以特選管道進入大學，很快發現其他同學是透過學測競爭進來的，學科底子更紮實。大一第一學期，你面臨英文授課、高難度數學……\n\n你怎麼面對？',
    choices: [
      { text: '🙈 覺得自己先天不足，開始自我放棄', outcome: 'bad', next: 'end' },
      { text: '📖 主動找學校的學習輔導資源，同時善用自己在實作上的強項', outcome: 'good', next: 'end' },
      { text: '💬 去找系上的特選生輔導老師，了解有哪些專屬學習支援', outcome: 'good', next: 'end' }
    ],
    feedbacks: {
      good: '做得好！特選生入學後常面臨學科適應壓力，但只要主動尋求資源、發揮實作優勢，就能找到自己的節奏。像成大資工系就為特選生配備了專屬輔導老師。',
      bad: '可惜！特選生確實容易偏科，但這不是終點。校方輔導資源、專屬老師都在等你主動求助。'
    }
  }
];

const endings = {
  high: { svgKey: 'end_high', hook: '你走出了一條屬於自己的路', sub: '資訊、策略、心態，你三樣都做到了', desc: '你在每個關鍵時刻做出了明智的判斷——蒐集資訊、精煉書審、主動面試、保留備案、入學後積極適應。這正是最理想的特選準備方式。特選制度充滿變數，但有準備的人總能找到屬於自己的出口。', label: '充分準備型' },
  mid:  { svgKey: 'end_mid',  hook: '每一次跌倒都讓你更清醒', sub: '特選最大的課題，是在不確定中保持判斷力', desc: '這趟旅程不是每一步都走對，但你在挫折中成長。特選的本質是：在制度的不確定性裡，主動展現自己、保留退路、持續調整策略。', label: '歷程學習型' },
  low:  { svgKey: 'end_low',  hook: '特選的路，比你想的更曲折', sub: '才華只是起點，策略與心態才是關鍵', desc: '特選不是「有才華就一定上」的捷徑，它同時需要資訊蒐集、清晰表達、心理準備和備案策略。這次模擬讓你看見了盲點——現實中的你還有機會重新出發！', label: '需要調整策略' }
};

/* ────────────────────────────────────────────
   遊戲狀態
──────────────────────────────────────────── */
let current = -1, score = 0, total = 0, chosen = null, chosenNext = null, locked = false;

function getEndKey() {
  const r = score / Math.max(total, 1);
  return r >= 0.7 ? 'high' : r >= 0.4 ? 'mid' : 'low';
}

/* ────────────────────────────────────────────
   渲染函式
──────────────────────────────────────────── */
function renderIntro() {
  document.getElementById('root').innerHTML = `
    <div class="intro-card">
      <div class="intro-illus">${svgs.intro}</div>
      <div class="intro-body">
        <div class="intro-tag">互動式升學模擬</div>
        <div class="intro-title">特選之路<br>你準備好了嗎？</div>
        <div class="intro-desc">
          以第一人稱視角，走過一個高三生嘗試透過「特殊選才」升大學的真實歷程。
          每一個選擇都會影響你的結局——根據政大大學報深度報導改編。
        </div>
        <div class="intro-meta">
          <div class="intro-meta-item"><strong>6</strong>個場景</div>
          <div class="intro-meta-item"><strong>3種</strong>結局</div>
          <div class="intro-meta-item"><strong>真實</strong>故事改編</div>
        </div>
        <button class="start-btn" onclick="startGame()">開始遊戲 →</button>
      </div>
    </div>`;
}

function renderHeader() {
  const pct = Math.round((current / scenes.length) * 100);
  return `
    <div class="game-header">
      <span class="game-logo">特選之路</span>
      <div class="progress-wrap"><div class="progress-fill" id="pbar" style="width:${pct}%"></div></div>
      <span class="scene-counter">${current + 1} / ${scenes.length}</span>
    </div>`;
}

function renderScene(idx) {
  locked = false; chosen = null; chosenNext = null;
  const s = scenes[idx];
  document.getElementById('root').innerHTML = renderHeader() + `
    <div class="card">
      <div class="illustration-wrap" style="background:${illusBg(s.badge.type)}">${svgs[s.svg]}</div>
      <div class="card-body">
        <span class="badge ${s.badge.type}">${s.badge.text}</span>
        <div class="scene-hook">${s.hook}</div>
        <div class="scene-sub">${s.sub}</div>
        <div class="divider"></div>
        <div class="scene-text">${s.text.replace(/\n/g,'<br>')}</div>
      </div>
      <div class="choices" id="choices">
        ${s.choices.map((c,i) => `<button class="choice-btn" onclick="choose(${i})">${c.text}</button>`).join('')}
      </div>
      <div id="feedback"></div>
    </div>`;
}

function illusBg(type) {
  if (type === 'badge-warn')   return '#FEF3C7';
  if (type === 'badge-danger') return '#FEE2E2';
  return '#FDE8D4';
}

function choose(i) {
  if (locked) return;
  locked = true;
  const s = scenes[current];
  const c = s.choices[i];
  chosen = c.outcome; chosenNext = c.next;
  if (c.outcome === 'good') score++;
  total++;
  document.querySelectorAll('.choice-btn').forEach((b, idx) => {
    b.disabled = true;
    if (idx === i) {
      if (c.outcome === 'good')    b.classList.add('correct');
      else if (c.outcome === 'bad') b.classList.add('wrong');
      else                          b.classList.add('neutral');
    }
  });
  const fb = s.feedbacks[c.outcome] || s.feedbacks.neutral || '';
  document.getElementById('feedback').innerHTML =
    `<div class="feedback-box">${fb}</div>
     <button class="next-btn" onclick="nextScene()">繼續 →</button>`;
}

function nextScene() {
  if (chosenNext === 'end') renderEnd();
  else { current = chosenNext; renderScene(current); }
}

function renderEnd() {
  const e = endings[getEndKey()];
  document.getElementById('root').innerHTML = `
    <div class="card">
      <div class="end-illustration" style="background:#FDE8D4">${svgs[e.svgKey]}</div>
      <div class="end-body">
        <span class="badge badge-month">遊戲結束</span>
        <div class="end-hook">${e.hook}</div>
        <div class="end-sub">${e.sub}</div>
        <div class="end-desc">${e.desc}</div>
        <div class="score-grid">
          <div class="score-card"><div class="score-label">決策得分</div><div class="score-value">${score} / ${total}</div></div>
          <div class="score-card"><div class="score-label">你的類型</div><div class="score-value" style="font-size:15px;line-height:1.4">${e.label}</div></div>
        </div>
        <div class="source-note">本遊戲根據政大大學報〈特殊選才是否仍足夠特殊？非典型升學路下的挑戰〉專題報導改編，反映真實特選生的歷程與困境。</div>
        <button class="restart-btn" onclick="restart()">再玩一次</button>
      </div>
    </div>`;
}

function startGame() { current = 0; renderScene(0); }
function restart() { current = 0; score = 0; total = 0; locked = false; renderScene(0); }

renderIntro();
</script>
</body>
</html>
